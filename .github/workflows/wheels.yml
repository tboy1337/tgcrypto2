name: Build and publish wheels

on:
  push:
    branches:
      - master

jobs:
  build_wheels_legacy:
    name: Build legacy wheels (3.7-3.8)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.3
        env:
          CIBW_ARCHS_MACOS: "x86_64 universal2 arm64"
          CIBW_BUILD: "cp3{7,8}-*"
          CIBW_TEST_REQUIRES: tox
          CIBW_TEST_COMMAND: >
            cd {project} &&
            python -c "import sys, subprocess; env='py{}{}'.format(*sys.version_info[:2]); exit(subprocess.call(['tox', '-e', env, '--', '-v']))"
          CIBW_TEST_COMMAND_WINDOWS: >
            cd {project} &&
            python -c "import sys, subprocess; env='py{}{}'.format(*sys.version_info[:2]); exit(subprocess.call(['tox', '-e', env, '--', '-v']))"
          CIBW_BUILD_VERBOSITY: 1

      - name: Store wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-legacy-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_wheels_modern:
    name: Build modern wheels (3.9-3.13)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.3
        env:
          CIBW_ARCHS_MACOS: "x86_64 universal2 arm64"
          CIBW_BUILD: "cp3{9,10,11,12,13}-*"
          CIBW_TEST_REQUIRES: tox
          CIBW_TEST_COMMAND: >
            cd {project} &&
            python -c "import sys, subprocess; env='py{}{}'.format(*sys.version_info[:2]); exit(subprocess.call(['tox', '-e', env, '--', '-v']))"
          CIBW_TEST_COMMAND_WINDOWS: >
            cd {project} &&
            python -c "import sys, subprocess; env='py{}{}'.format(*sys.version_info[:2]); exit(subprocess.call(['tox', '-e', env, '--', '-v']))"
          CIBW_BUILD_VERBOSITY: 1

      - name: Store wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-modern-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  publish:
    name: Publish wheels to PyPI
    needs: [build_wheels_legacy, build_wheels_modern]
    runs-on: ubuntu-latest

    steps:
      - name: Create dist directory
        run: mkdir -p dist

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: all-wheels
          merge-multiple: false

      - name: Move all wheels to dist directory
        run: |
          find all-wheels -type f -name "*.whl" -exec cp {} dist/ \;
          ls -la dist/

      - name: Setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Twine
        run: |
          pip install --upgrade twine

      - name: Publish wheels to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TGCRYPTO2 }}
        run: |
          twine check dist/*
          twine upload dist/*
